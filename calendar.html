<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campus Events Calendar</title>
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="site-header">
    <nav class="site-nav" aria-label="Main navigation">
      <a href="index.html" class="site-logo">Campus Events</a>

      <div class="nav-actions">
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle light and dark mode">
          🌙
        </button>
        <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation" aria-expanded="false" aria-controls="navLinks">
          ☰
        </button>
      </div>

      <ul class="nav-links" id="navLinks">
        <li><a href="index.html" data-page="home">Home</a></li>
        <li><a href="calendar.html" data-page="calendar">Calendar</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="page-hero">
      <div class="page-hero-content">
        <p class="eyebrow">Campus Calendar</p>
        <h1>Plan Your Semester</h1>
        <p>
          Browse upcoming campus events, add your own, and keep everything organized in one place.
        </p>
      </div>
    </section>

    <section class="content-section">
      <div class="layout-grid">
        <aside class="panel">
          <div class="panel-heading">
            <h2>Add Event</h2>
            <p>Fill out the form below to create a new event.</p>
          </div>

          <form id="eventForm" novalidate>
            <label for="title">Event Title</label>
            <input type="text" id="title" name="title" required />

            <label for="location">Location</label>
            <input type="text" id="location" name="location" required />

            <label for="start">Start Time</label>
            <input type="datetime-local" id="start" name="start" required />

            <label for="end">End Time</label>
            <input type="datetime-local" id="end" name="end" />

            <label for="description">Description</label>
            <textarea id="description" name="description" rows="5"></textarea>

            <button type="submit" class="button">Add Event</button>

            <p id="eventMessage" class="message" aria-live="polite"></p>
          </form>
        </aside>

        <section class="calendar-container">
          <div class="panel-heading">
            <h2>Event Calendar</h2>
            <p>Select an event to view more details.</p>
          </div>
          <div id="calendar"></div>
        </section>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>&copy; 2026 Campus Events</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
  <script type="module" src="js/navbar.js"></script>
  <script type="module" src="js/calendar.js"></script>
</body>
</html>
